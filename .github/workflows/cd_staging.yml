name: Deploy to staging
on:
  push:
    branches:
      - main
jobs:
  redeploy_everything:
    runs-on: ubuntu-latest
    name: Deploy frontend to staging
    steps:
      name: SSH into the machine
      run: |
          echo {{ secrets.SSH_PRIVATE_KEY}} > ~/ssh_key
          chmod 600 ~/ssh_key
          ssh -i ssh_key ubuntu@54.160.182.214
          cd test-app-devops && git pull
          pnpm install
          pnpm build
          pm2 restart all