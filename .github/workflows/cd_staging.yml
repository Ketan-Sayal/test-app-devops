name: Deploy to staging

on:
  push:
    branches:
      - main

jobs:
  redeploy_everything:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ssh_key
          chmod 700 ssh_key

          ssh -o StrictHostKeyChecking=no -i ssh_key ubuntu@54.91.77.197 "bash -c '
            # ensure node exists
            command -v node || (curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash - && sudo apt install -y nodejs)

            # ensure pnpm exists
            command -v pnpm || npm install -g pnpm

            # ensure pm2 exists
            command -v pm2 || npm install -g pm2

            cd ~/test-app-devops &&
            git pull origin main &&

            pnpm install &&
            pnpm build &&

            pm2 restart all || pm2 start pnpm --name http-server -- run dev
          '"